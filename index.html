"in linear algebra an eigenvector of a linear transformation is a nonzero vector that changes at most by a constant factor when that linear transformation is applied to it . the corresponding eigenvalue is the factor by which the eigenvector is scaled . "+

"the spectral gap of a stochastic matrix is the difference between its largest eigenvalue and its second largest eigenvalue . a large spectral gap means the markov chain mixes quickly and the power iteration converges fast . "+
"eigenvalue perturbation theory studies how eigenvalues change when a matrix is slightly modified . the davis kahan theorem bounds the rotation of eigenvectors under perturbation . this is important for the stability of algorithms . "+
"numerical linear algebra is the study of algorithms for matrix computations . the most important operations are matrix multiplication solving linear systems and computing eigenvalues . modern implementations use highly optimized libraries . "+
"the fast fourier transform computes the discrete fourier transform in order n log n operations instead of n squared . this made spectral analysis practical for large datasets and revolutionized signal processing . "+
"quantum computing uses quantum mechanical phenomena to perform computation . quantum bits or qubits can exist in a superposition of states . quantum algorithms like shor algorithm exploit eigenvalue structure for factoring large numbers .";


var words = RAW.toLowerCase().split(/\s+/);
var W2I = {}, I2W = {}, VOCAB = 0;
for (var i = 0; i < words.length; i++) { if (W2I[words[i]] === undefined) { W2I[words[i]] = VOCAB; I2W[VOCAB] = words[i]; VOCAB++; } }

var CTX = 5, HASH = 128, N_BI = 3, FEAT = CTX*HASH + N_BI*HASH, D = 2048, SIGMA = 1.5, LAM = 0.008;

function hashW(w) { var h=0; for(var i=0;i<w.length;i++) h=((h*31)+w.charCodeAt(i))|0; return((h%HASH)+HASH)%HASH; }
function hashP(a,b) { var s=a+'|'+b; var h=0; for(var i=0;i<s.length;i++) h=((h*37)+s.charCodeAt(i))|0; return((h%HASH)+HASH)%HASH; }

function encodeCtx(ctx) {
  var vec = new Float32Array(FEAT);
  for (var p=0;p<CTX;p++) { var w=ctx[p]||''; if(!w)continue; var wt=0.4+0.6*(p/(CTX-1)); vec[p*HASH+hashW(w)]+=wt; if(W2I[w]!==undefined) vec[p*HASH+(W2I[w]%HASH)]+=wt*0.5; }
  var bo=CTX*HASH;
  for (var b=0;b<N_BI;b++) { var p1=CTX-N_BI-1+b,p2=p1+1; if(p1<0||!ctx[p1]||!ctx[p2])continue; vec[bo+b*HASH+hashP(ctx[p1],ctx[p2])]=1.0; }
  return vec;
}

// === UI ===
var pb=document.getElementById('pb'),stEl=document.getElementById('st'),chatEl=document.getElementById('chat');
var inEl=document.getElementById('in'),goBtn=document.getElementById('go');
var tmpSl=document.getElementById('tmp'),tvEl=document.getElementById('tv');
var topkSl=document.getElementById('topk'),kvEl=document.getElementById('kv');
var mwSl=document.getElementById('mw'),wvEl=document.getElementById('wv');
var nfoEl=document.getElementById('nfo'),exEl=document.getElementById('examples'),gpuBdg=document.getElementById('gpuBadge');
tmpSl.oninput=function(){tvEl.textContent=parseFloat(tmpSl.value).toFixed(2);};
topkSl.oninput=function(){kvEl.textContent=topkSl.value;};
mwSl.oninput=function(){wvEl.textContent=mwSl.value;};

function setSt(msg,cls,pct) { stEl.textContent=msg; stEl.className='st '+(cls||''); if(pct!==undefined) pb.style.width=pct+'%'; }
function addMsg(txt,cls) { var d=document.createElement('div'); d.className='m '+cls; if(typeof txt==='string') d.textContent=txt; else d.appendChild(txt); chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight; return d; }

// === GPU TRAINING WITH TENSORFLOW.JS ===
var W_cpu = null; // Float64Array D×VOCAB for fast CPU inference

async function trainGPU() {
  await tf.ready();
  var backend = tf.getBackend();
  gpuBdg.textContent = backend === 'webgl' ? 'WebGL GPU' : backend === 'webgpu' ? 'WebGPU' : backend;
  gpuBdg.style.borderColor = backend.includes('web') ? '#22d3ee50' : '#f59e0b50';
  gpuBdg.style.color = backend.includes('web') ? '#22d3ee' : '#f59e0b';

  setSt('Building dataset (' + words.length + ' tokens, ' + VOCAB + ' unique words)...', 't', 10);
  await tf.nextFrame();

  var t0 = performance.now();
  var N = words.length - CTX;

  // === Step 1: Build feature matrix X on CPU (sparse, fast) ===
  var X_data = new Float32Array(N * FEAT);
  var Y_data = new Float32Array(N * VOCAB); // one-hot
  for (var i = 0; i < N; i++) {
    var ctx = words.slice(i, i + CTX);
    var vec = encodeCtx(ctx);
    X_data.set(vec, i * FEAT);
    Y_data[i * VOCAB + W2I[words[i + CTX]]] = 1;
  }
  var tFeat = ((performance.now() - t0)/1000).toFixed(2);
  setSt('Features built in ' + tFeat + 's. Generating random projections on GPU...', 't', 20);
  await tf.nextFrame();

  // === Step 2: RFF on GPU — Z = cos(X @ omega + bias) * sqrt(2/D) ===
  var tGpu = performance.now();

  var X_tf = tf.tensor2d(X_data, [N, FEAT]);
  X_data = null; // free

  // Random projection matrix (FEAT × D) and bias (D)
  var omega_tf = tf.randomNormal([FEAT, D], 0, 1/SIGMA);
  var bias_tf = tf.randomUniform([1, D], 0, 2 * Math.PI);
  var scale = Math.sqrt(2.0 / D);

  // Z = sqrt(2/D) * cos(X @ omega + bias)  — ALL ON GPU
  var Z_tf = tf.tidy(function() {
    var proj = tf.matMul(X_tf, omega_tf);        // N×D  — GPU matmul!
    var shifted = tf.add(proj, bias_tf);           // N×D
    return tf.mul(tf.cos(shifted), scale);         // N×D
  });
  X_tf.dispose();

  var tRff = ((performance.now() - tGpu)/1000).toFixed(2);
  setSt('RFF done in ' + tRff + 's (GPU). Computing Z^TZ (' + D + '\u00D7' + D + ') on GPU...', 't', 40);
  await tf.nextFrame();

  // === Step 3: Z^TZ + λI on GPU ===
  var tSolve = performance.now();
  var Y_tf = tf.tensor2d(Y_data, [N, VOCAB]);
  Y_data = null;

  var ZTZ = tf.tidy(function() {
    var ztx = tf.matMul(Z_tf, Z_tf, true, false);  // D×D  — GPU matmul!
    var reg = tf.mul(tf.eye(D), LAM);
    return tf.add(ztx, reg);
  });

  // Z^TY on GPU
  var ZTY = tf.matMul(Z_tf, Y_tf, true, false); // D×VOCAB  — GPU!
  Z_tf.dispose(); Y_tf.dispose();

  var tMat = ((performance.now() - tSolve)/1000).toFixed(2);
  setSt('Z^TZ in ' + tMat + 's (GPU). Solving ' + D + '\u00D7' + D + ' system...', 't', 60);
  await tf.nextFrame();

  // === Step 4: Download to CPU and solve via Gaussian elimination ===
  // (tf.linalg.solve is not available in browser tf.js — but the solve
  //  is only 2048×2048, fast on CPU. The GPU did the heavy lifting above.)
  var tSolve2 = performance.now();
  setSt('Downloading matrices from GPU...', 't', 68);
  await tf.nextFrame();

  var ZTZ_raw = await ZTZ.data();  // Float32Array D*D
  var ZTY_raw = await ZTY.data();  // Float32Array D*VOCAB
  ZTZ.dispose(); ZTY.dispose();

  setSt('Solving ' + D + '\u00D7' + D + ' system on CPU (Gauss elimination)...', 't', 72);
  await tf.nextFrame();

  // Augmented matrix [ZTZ | ZTY] and Gaussian elimination
  var cols = D + VOCAB;
  var M = new Float64Array(D * cols);
  for (var i = 0; i < D; i++) {
    for (var j = 0; j < D; j++) M[i*cols+j] = ZTZ_raw[i*D+j];
    for (var j = 0; j < VOCAB; j++) M[i*cols+D+j] = ZTY_raw[i*VOCAB+j];
  }
  ZTZ_raw = null; ZTY_raw = null;

  for (var col = 0; col < D; col++) {
    var mr=col, mv=Math.abs(M[col*cols+col]);
    for (var r=col+1; r<D; r++) { var av=Math.abs(M[r*cols+col]); if(av>mv){mv=av;mr=r;} }
    if (mr!==col) for(var j=col;j<cols;j++){var t=M[col*cols+j];M[col*cols+j]=M[mr*cols+j];M[mr*cols+j]=t;}
    var piv=M[col*cols+col]; if(Math.abs(piv)<1e-14) continue;
    for (var r=col+1; r<D; r++) {
      var f=M[r*cols+col]/piv; if(Math.abs(f)<1e-14) continue;
      for(var j=col;j<cols;j++) M[r*cols+j]-=f*M[col*cols+j];
    }
    if (col%400===0) { pb.style.width=(72+13*col/D)+'%'; }
  }
  // Back substitution → W_cpu (D×VOCAB)
  W_cpu = new Float64Array(D * VOCAB);
  for (var i=D-1; i>=0; i--) {
    var piv=M[i*cols+i]; if(Math.abs(piv)<1e-14) continue;
    for (var v=0; v<VOCAB; v++) {
      var val=M[i*cols+D+v];
      for(var j=i+1;j<D;j++) val-=M[i*cols+j]*W_cpu[j*VOCAB+v];
      W_cpu[i*VOCAB+v]=val/piv;
    }
  }
  M = null;

  var tSolveTime = ((performance.now() - tSolve2)/1000).toFixed(2);
  setSt('Solved in ' + tSolveTime + 's (CPU). Testing...', 't', 88);
  await tf.nextFrame();

  // Keep omega and bias on CPU for inference
  var omega_raw = await omega_tf.data();
  var bias_raw = await bias_tf.data();
  omega_tf.dispose(); bias_tf.dispose();

  // Store for CPU inference
  window._omega = omega_raw; // Float32Array FEAT×D
  window._bias = bias_raw;   // Float32Array D

  var totalTime = ((performance.now() - t0)/1000).toFixed(1);

  // === Quick accuracy test ===
  setSt('Testing accuracy...', 't', 92);
  await tf.nextFrame();

  var correct = 0, top3 = 0, total = 0;
  var testStart = Math.max(0, words.length - CTX - 300);
  for (var i = testStart; i < words.length - CTX; i++) {
    var scores = predictScores(words.slice(i, i + CTX));
    var target = W2I[words[i + CTX]];
    var best = 0; for (var v = 1; v < VOCAB; v++) if (scores[v] > scores[best]) best = v;
    if (best === target) correct++;
    // top-3
    var s3 = []; for (var v = 0; v < VOCAB; v++) s3.push({s:scores[v],i:v});
    s3.sort(function(a,b){return b.s-a.s;});
    if (s3[0].i===target||s3[1].i===target||s3[2].i===target) top3++;
    total++;
  }
  var acc1 = (100*correct/total).toFixed(0);
  var acc3 = (100*top3/total).toFixed(0);

  pb.style.width = '100%';
  setSt('Ready \u2014 ' + words.length + ' tokens, ' + VOCAB + ' words, D=' + D + ' | GPU training: ' + totalTime + 's | top-1=' + acc1 + '% top-3=' + acc3 + '%', 'r');
  nfoEl.innerHTML = 'vocab='+VOCAB+' · top-1='+acc1+'% · top-3='+acc3+'% · <span class="timer">GPU '+totalTime+'s</span>';
  inEl.disabled=false; goBtn.disabled=false; inEl.focus();
  addMsg('I\u2019m a mini language model built on Kernel Ridge Regression \u2014 no neural network, just eigenvalues & matrix math. Trained on your GPU (' + backend + ') in ' + totalTime + 's on ' + words.length + ' tokens. Ask me about eigenvalues, kernel methods, quantum mechanics, or machine learning!', 's');

  ['What is an eigenvalue?','Explain kernel ridge regression','How does PageRank work?','What is the neumann series?','Why do neural networks work?','What is regularization?','Explain the kernel trick','What is the spectral theorem?','How does attention work?'].forEach(function(ex){
    var btn=document.createElement('button'); btn.textContent=ex;
    btn.onclick=function(){inEl.value=ex;handleSend();}; exEl.appendChild(btn);
  });
}

// === CPU INFERENCE (fast — no tf.js overhead per prediction) ===
function rffCPU(vec) {
  var z = new Float32Array(D);
  var sc = Math.sqrt(2.0/D);
  var nz = []; for (var k=0;k<FEAT;k++) if (vec[k]!==0) nz.push(k);
  var om = window._omega, bi = window._bias;
  for (var j=0;j<D;j++) {
    var dot=0; for(var ni=0;ni<nz.length;ni++){var k=nz[ni];dot+=vec[k]*om[k*D+j];}
    z[j]=Math.cos(dot+bi[j])*sc;
  }
  return z;
}

function predictScores(contextWords) {
  var ctx=contextWords.slice(-CTX); while(ctx.length<CTX)ctx.unshift('');
  var z=rffCPU(encodeCtx(ctx));
  var scores=new Float64Array(VOCAB);
  for(var j=0;j<D;j++){var zj=z[j];if(Math.abs(zj)<1e-8)continue;for(var v=0;v<VOCAB;v++)scores[v]+=zj*W_cpu[j*VOCAB+v];}
  return scores;
}

function predictWord(contextWords,temperature,topK,recentWords) {
  var scores = predictScores(contextWords);
  if(recentWords)for(var r=0;r<recentWords.length;r++){var ri=W2I[recentWords[r]];if(ri!==undefined)scores[ri]*=0.25;}
  var indexed=[]; for(var v=0;v<VOCAB;v++)indexed.push({s:scores[v],i:v});
  indexed.sort(function(a,b){return b.s-a.s;});
  var top=indexed.slice(0,topK); var maxS=top[0].s,sum=0;
  for(var k=0;k<top.length;k++){top[k].p=Math.exp((top[k].s-maxS)/Math.max(temperature,0.005));sum+=top[k].p;}
  for(var k=0;k<top.length;k++)top[k].p/=sum;
  var r=Math.random(),c=0;
  for(var k=0;k<top.length;k++){c+=top[k].p;if(r<c)return I2W[top[k].i];}
  return I2W[top[top.length-1].i];
}

// === CHAT ===
function handleSend() {
  var userText=inEl.value.trim(); if(!userText||!W_cpu)return; inEl.value='';
  addMsg(userText,'u');

  // Q&A wrapper: turn user input into a completion prompt
  // The model is a completion model, so we steer it into answering
  var prompt = userText.toLowerCase().replace(/[?!]+$/,'');
  // Heuristic: if it looks like a question, prepend context
  var promptWords;
  if (/^(what|why|how|who|where|when|is|are|do|does|can|could|explain|tell|describe)/.test(prompt)) {
    // "what is an eigenvalue" → "an eigenvalue is"
    prompt = prompt.replace(/^what (is|are) (an? |the )?/i, '$2').replace(/^(why|how|explain|tell me about|describe) /i, '');
    promptWords = prompt.split(/\s+/);
    // Append "is" or "are" to guide completion
    var lastW = promptWords[promptWords.length-1];
    if (lastW !== 'is' && lastW !== 'are' && lastW !== '.') {
      promptWords.push(lastW.endsWith('s') ? 'are' : 'is');
    }
  } else {
    promptWords = prompt.split(/\s+/);
  }

  var temp=parseFloat(tmpSl.value),topK=parseInt(topkSl.value),minW=parseInt(mwSl.value);
  var allWords=promptWords.slice(),recent=[];

  var container=document.createDocumentFragment();
  var genSpan=document.createElement('span');genSpan.className='gn';
  container.appendChild(genSpan);
  var botEl=addMsg(container,'b');
  var wi=0, hardMax=250, hitSentenceEnd=false;

  function step(){
    // Stop condition: after minW words, stop at next sentence end (.)
    // Hard stop at hardMax regardless
    if (wi >= hardMax) { finish(); return; }
    if (wi >= minW && hitSentenceEnd) { finish(); return; }

    var next=predictWord(allWords,temp,topK,recent);
    allWords.push(next); recent.push(next); if(recent.length>10)recent.shift();

    if (next === '.') hitSentenceEnd = true;

    genSpan.textContent += (wi>0?' ':'') + next;
    wi++; chatEl.scrollTop=chatEl.scrollHeight;
    setTimeout(step, (next==='.')?60:20);
  }

  function finish() {
    var badge=document.createElement('span');badge.className='bd';
    badge.textContent='KRR\u00B7'+wi+' words\u00B7D='+D;
    botEl.appendChild(badge);
  }

  setTimeout(step,100);
}
goBtn.onclick=handleSend; inEl.onkeydown=function(e){if(e.key==='Enter')handleSend();};

// === GO ===
trainGPU().catch(function(err) {
  setSt('Error: ' + err.message, '', 0);
  console.error(err);
});
})();
